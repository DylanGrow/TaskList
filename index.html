<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TaskFlow Pro: Secure and accessible task management tracker.">
    <meta name="keywords" content="accounting, task tracker, taskflow, productivity, blue and silver">
    <title>TaskFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="task-container">
        <h2>TaskFlow Pro</h2>
        
        <div class="input-group">
            <input type="text" id="task-input" placeholder="Enter a new work task..." aria-label="Enter a new work task">
            <button id="add-btn" aria-label="Submit new task">Add Task</button>
        </div>
        
        <div id="error-message" role="alert">Please enter a valid task before submitting.</div>
        
        <ul id="task-list" aria-live="polite"></ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
